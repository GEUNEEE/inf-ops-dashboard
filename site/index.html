<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>인플루언서 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:  #FAFAF8;
      --bg2: #F2F0E8;
      --border:  #E5E3D6;
      --border2: #D3D1C7;
      --text1: #1A1A18;
      --text2: #666660;
      --text3: #A8A69C;
      --r: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text1);
      font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', sans-serif;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
    }
    a { text-decoration: none; color: inherit; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px 20px; }

    /* Section label */
    .slbl {
      font-size: 10px; font-weight: 500; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px;
    }

    /* Card */
    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--r);
      padding: 14px;
    }

    /* KPI card */
    .kpi-card { background: var(--bg2); border-radius: var(--r); padding: 11px 13px; }
    .kpi-lbl  { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
    .kpi-val  { font-size: 22px; font-weight: 500; color: var(--text1); line-height: 1.2; }
    .kpi-sub  { font-size: 10px; color: var(--text3); margin-top: 3px; min-height: 14px; }

    /* Grid layouts */
    .kpi-grid      { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 7px; margin-bottom: 14px; }
    .funnel-grid   { display: grid; grid-template-columns: 3fr 2fr; gap: 8px; margin-bottom: 12px; }
    .inf-grid      { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
    .chart-grid    { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }

    /* Funnel bars */
    .f-bar   { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .f-track { flex: 1; height: 30px; background: var(--bg2); border-radius: 5px; overflow: hidden; position: relative; }
    .f-fill  { height: 100%; border-radius: 5px; }
    .f-label { position: absolute; inset: 0; display: flex; align-items: center; padding: 0 10px; justify-content: space-between; }
    .f-name  { font-size: 11px; font-weight: 500; color: var(--text1); }
    .f-cnt   { font-size: 11px; color: var(--text2); }
    .f-pct   { min-width: 44px; text-align: right; font-size: 11px; font-weight: 500; }

    /* Donut legend */
    .donut-legend  { margin-top: 10px; }
    .legend-row    { display: flex; align-items: center; justify-content: space-between; font-size: 10px; padding: 4px 0; border-bottom: 0.5px solid var(--border); }
    .legend-row:last-child { border-bottom: none; }
    .legend-left   { display: flex; align-items: center; gap: 6px; }
    .legend-dot    { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-lbl    { color: var(--text2); }
    .legend-right  { display: flex; gap: 8px; color: var(--text3); }

    /* Status pill */
    .pill              { display: inline-flex; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 9px; white-space: nowrap; }
    .pill-exp          { background: #EEEDFE; color: #3C3489; }
    .pill-adplan       { background: #EAF3DE; color: #3B6D11; }
    .pill-addone       { background: #C0DD97; color: #27500A; }
    .pill-meeting      { background: #FAEEDA; color: #633806; }
    .pill-meeting-plan { background: #FAC775; color: #412402; }
    .pill-meeting-active{ background: #E6F1FB; color: #0C447C; }
    .pill-reject       { background: #FCEBEB; color: #A32D2D; }
    .pill-etc          { background: var(--bg2); color: var(--text3); }
    .pill-target       { background: #EAF3DE; color: #3B6D11; }
    .pill-general      { background: var(--bg2); color: var(--text3); }

    /* Tier breakdown */
    .tier-section { margin-top: 4px; }
    .tier-row     { display: flex; justify-content: space-between; align-items: center; font-size: 11px; padding: 2px 0; color: var(--text2); }
    .tier-row + .tier-row { border-top: 0.5px solid var(--border); margin-top: 2px; padding-top: 4px; }
    .tier-up      { font-size: 9px; color: #3B6D11; font-weight: 600; margin-left: 3px; }
    .tier-total   { display: flex; justify-content: space-between; align-items: center; border-top: 0.5px solid var(--border2); margin-top: 3px; padding-top: 4px; font-size: 11px; }

    /* Influencer card */
    .inf-card        { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r); padding: 14px; display: block; transition: background 0.1s; }
    .inf-card:hover  { background: var(--bg2); }
    .inf-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .inf-card-name   { font-weight: 500; font-size: 13px; }
    .inf-card-stats  { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px 4px; margin-top: 8px; }
    .stat-lbl        { font-size: 10px; color: var(--text3); display: block; }
    .stat-val        { font-weight: 500; font-size: 12px; }

    /* Month filter chips */
    .filter-row  { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .filter-chip {
      font-size: 10px; padding: 3px 9px; border-radius: 11px;
      border: 0.5px solid var(--border2); background: transparent;
      color: var(--text2); font-weight: 500; cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .filter-chip.active { background: var(--text1); color: var(--bg); border-color: var(--text1); }

    /* Banners */
    .banner      { border-radius: var(--r); padding: 10px 13px; font-size: 11px; font-weight: 500; margin-bottom: 12px; }
    .banner-warn { background: #FAEEDA; border: 0.5px solid #EEC97A; color: #633806; }
    .banner-err  { background: #FCEBEB; border: 0.5px solid #E8AAAA; color: #A32D2D; }
    .hidden      { display: none !important; }

    /* Page header */
    .page-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; }
    .page-title  { font-size: 15px; font-weight: 500; }
    .page-sub    { font-size: 10px; color: var(--text3); }

    .mb12 { margin-bottom: 12px; }

    /* Funnel monthly trend table */
    .fmonth-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .fmonth-table th { color: var(--text3); font-weight: 500; padding: 5px 8px; text-align: right; border-bottom: 0.5px solid var(--border2); white-space: nowrap; }
    .fmonth-table th:first-child { text-align: left; }
    .fmonth-table td { padding: 5px 8px; text-align: right; border-bottom: 0.5px solid var(--border); color: var(--text2); white-space: nowrap; }
    .fmonth-table td:first-child { text-align: left; color: var(--text1); font-weight: 500; }
    .fmonth-table tr:last-child td { border-bottom: none; }
    .fmonth-cnt { font-weight: 500; color: var(--text1); }
    .fmonth-pct { font-size: 10px; color: var(--text3); margin-left: 3px; }
    .fmonth-cur td:first-child { color: #185FA5; }

    /* 영업이익 KPI 행 */
    .profit-kpi-row { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 7px; margin-bottom: 14px; }
    .kpi-card-accent { background: #EAF3DE; border-radius: var(--r); padding: 11px 13px; }

    /* 기여 수익 테이블 */
    .contrib-tbl { width: 100%; border-collapse: collapse; font-size: 11px; }
    .contrib-tbl th { color: var(--text3); font-weight: 500; padding: 5px 8px; text-align: right; border-bottom: 0.5px solid var(--border2); white-space: nowrap; }
    .contrib-tbl th:first-child { text-align: left; }
    .contrib-tbl td { padding: 5px 8px; text-align: right; border-bottom: 0.5px solid var(--border); color: var(--text2); white-space: nowrap; }
    .contrib-tbl td:first-child { text-align: left; color: var(--text1); font-weight: 500; }
    .contrib-tbl tr:last-child td { border-bottom: none; }
    .contrib-tbl tfoot td { border-top: 0.5px solid var(--border2); font-weight: 600; color: var(--text1); padding-top: 7px; }
    .contrib-tbl tfoot td:first-child { text-align: left; color: var(--text3); }
  </style>
</head>
<body data-page="dashboard">
  <div class="wrap">

    <div class="page-header">
      <span class="page-title">인플루언서 대시보드</span>
      <span class="page-sub" id="generated-at"></span>
    </div>

    <div id="error-banner" class="banner banner-err hidden"></div>
    <div id="alert-banner" class="banner banner-warn hidden"></div>

    <!-- 월별 필터 -->
    <div class="filter-row" id="month-filter"></div>

    <!-- KPI 5칸 -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-lbl">이번달 매출</div>
        <div class="kpi-val" id="kpi-revenue">-</div>
        <div class="kpi-sub" id="kpi-revenue-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-lbl">주문수</div>
        <div class="kpi-val" id="kpi-orders">-</div>
        <div class="kpi-sub" id="kpi-orders-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-lbl">수익</div>
        <div class="kpi-val" id="kpi-profit">-</div>
        <div class="kpi-sub" id="kpi-profit-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-lbl">응답률</div>
        <div class="kpi-val" id="kpi-reply-rate" style="color:#185FA5">-</div>
        <div class="kpi-sub" id="kpi-reply-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-lbl">체험전환율</div>
        <div class="kpi-val" id="kpi-exp-rate" style="color:#534AB7">-</div>
        <div class="kpi-sub" id="kpi-exp-sub"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-lbl">광고수락률</div>
        <div class="kpi-val" id="kpi-ad-rate" style="color:#3B6D11">-</div>
        <div class="kpi-sub" id="kpi-ad-sub"></div>
      </div>
    </div>

    <!-- 영업이익 KPI 행 (수익관리 시트 기반) -->
    <div class="profit-kpi-row">
      <div class="kpi-card-accent">
        <div class="kpi-lbl">영업이익 <span style="font-size:9px;color:var(--text3)">(인건비 제외)</span></div>
        <div class="kpi-val" id="kpi-op-profit">-</div>
        <div class="kpi-sub" id="kpi-op-profit-sub"></div>
      </div>
      <div class="kpi-card-accent">
        <div class="kpi-lbl">영업이익률</div>
        <div class="kpi-val" id="kpi-op-rate" style="color:#3B6D11">-</div>
        <div class="kpi-sub" id="kpi-op-rate-sub"></div>
      </div>
      <div class="kpi-card-accent">
        <div class="kpi-lbl">누적 손익</div>
        <div class="kpi-val" id="kpi-cumulative">-</div>
        <div class="kpi-sub" id="kpi-cumulative-sub">전체 누계</div>
      </div>
    </div>

    <!-- 퍼널 바 + 도넛 차트 -->
    <div class="funnel-grid">
      <div class="card">
        <div class="slbl">메일 발송 퍼널</div>
        <div id="funnel-bars"></div>
      </div>
      <div class="card">
        <div class="slbl">인플루언서 현황</div>
        <div style="display:flex;justify-content:center;height:160px">
          <canvas id="donut-chart"></canvas>
        </div>
        <div class="donut-legend" id="donut-legend"></div>
      </div>
    </div>

    <!-- 인플루언서 카드 그리드 -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div class="slbl" style="margin-bottom:0">인플루언서별 현황</div>
      <span id="inf-count-label"></span>
    </div>
    <div class="inf-grid" id="inf-grid"></div>

    <!-- 퍼널 월별 추이 테이블 -->
    <div class="card mb12">
      <div class="slbl">메일 퍼널 월별 추이</div>
      <div id="funnel-monthly-table"></div>
    </div>

    <!-- 추세 차트 -->
    <div class="chart-grid">
      <div class="card">
        <div class="slbl">퍼널 추세</div>
        <canvas id="trend-chart" height="180"></canvas>
      </div>
      <div class="card">
        <div class="slbl">매출 · 수익</div>
        <canvas id="revenue-chart" height="180"></canvas>
      </div>
    </div>

    <!-- 수익 분석 (수익관리 시트 기반) -->
    <div class="chart-grid" style="margin-top:8px">
      <div class="card">
        <div class="slbl">월별 영업이익 · 이익률</div>
        <canvas id="profit-chart" height="180"></canvas>
      </div>
      <div class="card">
        <div class="slbl">인플루언서별 누적 기여 수익 <span style="font-size:9px;color:var(--text3)">(전체 누계)</span></div>
        <div id="contrib-table"></div>
      </div>
    </div>

  </div>
  <script src="assets/app.js?v=20260517i"></script>
</body>
</html>

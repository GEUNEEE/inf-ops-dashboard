<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>인플루언서 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { accent: '#818cf8' } } }
    };
    // 시스템 다크모드 자동 감지
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <style>
    body { background: #111827; color: #f9fafb; font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
    .card { background: #1f2937; border-radius: 12px; padding: 1rem; transition: box-shadow .2s; }
    .card-link { display: block; background: #1f2937; border-radius: 12px; padding: 1rem;
                 text-decoration: none; color: inherit; transition: box-shadow .2s; }
    .card-link:hover { box-shadow: 0 0 0 2px #6366f1; }
    .card-inner {}
    .card-header { display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem; }
    .card-name { font-weight: 700; font-size: 1rem; }
    .card-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .25rem; font-size: .85rem; }
    .stat-label { color: #9ca3af; display: block; font-size: .75rem; }
    .stat-val { font-weight: 600; }
    .badge-blue { background: #3730a3; color: #a5b4fc; padding: 2px 8px; border-radius: 9999px; font-size: .7rem; }
    .badge-gray { background: #374151; color: #9ca3af; padding: 2px 8px; border-radius: 9999px; font-size: .7rem; }
    .kpi-card { background: #1f2937; border-radius: 12px; padding: 1.25rem; }
    .kpi-label { color: #9ca3af; font-size: .8rem; margin-bottom: .25rem; }
    .kpi-val { font-size: 1.6rem; font-weight: 700; color: #e0e7ff; }
    .section-title { font-size: 1.1rem; font-weight: 700; color: #c7d2fe; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; }
    td, th { padding: .5rem .75rem; border-bottom: 1px solid #374151; }
    th { color: #9ca3af; font-size: .8rem; text-align: left; }
    .text-right { text-align: right; }
    .font-mono { font-family: monospace; }
    .text-indigo-400 { color: #818cf8; }
    .chart-wrap { overflow-x: auto; }
    .chart-wrap canvas { min-width: 300px; }
  </style>
</head>
<body data-page="dashboard">

  <!-- 에러 배너 -->
  <div id="error-banner" class="hidden bg-red-900 text-red-200 px-4 py-2 text-sm"></div>

  <!-- 알림 배너 -->
  <div id="alert-banner" class="hidden bg-yellow-900 text-yellow-200 px-4 py-2 text-sm font-semibold"></div>

  <div class="max-w-6xl mx-auto px-4 py-6">

    <!-- 헤더 -->
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-indigo-300">📊 인플루언서 대시보드</h1>
      <span id="generated-at" class="text-xs text-gray-500"></span>
    </div>

    <!-- KPI 카드 4칸 -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="kpi-card">
        <div class="kpi-label">이번달 매출</div>
        <div class="kpi-val" id="kpi-revenue">-</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">주문수</div>
        <div class="kpi-val" id="kpi-orders">-</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">수익</div>
        <div class="kpi-val" id="kpi-profit">-</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">광고 수락률</div>
        <div class="kpi-val" id="kpi-ad-rate">-</div>
      </div>
    </div>

    <!-- 추세선 차트 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      <div class="card">
        <div class="section-title">📈 퍼널 추세</div>
        <div class="chart-wrap"><canvas id="trend-chart" height="200"></canvas></div>
      </div>
      <div class="card">
        <div class="section-title">💰 매출 · 수익</div>
        <div class="chart-wrap"><canvas id="revenue-chart" height="200"></canvas></div>
      </div>
    </div>

    <!-- 인플루언서 카드 그리드 -->
    <div class="section-title">👥 인플루언서 현황</div>
    <div id="inf-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-8"></div>

    <!-- 퍼널 KPI 상세 -->
    <div class="card">
      <div class="section-title">📬 메일 퍼널 상세</div>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div><span class="stat-label">응답률</span><span class="stat-val text-indigo-400" id="kpi-reply-rate">-</span></div>
        <div><span class="stat-label">체험전환율</span><span class="stat-val text-green-400" id="kpi-exp-rate">-</span></div>
      </div>
      <table>
        <thead><tr><th>단계</th><th class="text-right">건수</th><th class="text-right">전환율</th></tr></thead>
        <tbody id="funnel-tbody"></tbody>
      </table>
    </div>

  </div>

  <script src="assets/app.js"></script>
</body>
</html>
